<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Chicagoland Events</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#d4a843" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Chi Events" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- SEO -->
    <meta name="description" content="Discover local events, festivals, and activities across Chicago and suburbs. AI-powered weekend planning." />
    <meta name="keywords" content="Chicago events, things to do in Chicago, weekend events, Chicago festivals, Chicago activities" />

    <!-- Open Graph / Social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Chicagoland Events — Your Weekend, Planned" />
    <meta property="og:description" content="Discover local events, festivals, and activities across Chicago and suburbs. AI-powered weekend planning." />
    <meta property="og:image" content="/icons/icon-512.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Chicagoland Events — Your Weekend, Planned" />
    <meta name="twitter:description" content="Discover local events, festivals, and activities across Chicago and suburbs. AI-powered weekend planning." />

    <!-- Mapbox -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.6.0/mapbox-gl.css" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
